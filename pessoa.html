<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil da Pessoa | Escala</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/main.css">

<style>
    :root {
        --bg-dark: #0a0a0c;
        --accent: #d4af37;
        --color-proj: #3b82f6;
        --color-mesa: #22c55e;
        --color-trans: #facc15;
    }

    body {
        background-color: var(--bg-dark);
        font-family: 'Inter', sans-serif;
        color: #fff;
        margin: 0;
        padding: 20px;
        position: relative;
        min-height: 100vh;
        overflow-x: hidden;
    }

    /* Fundo com imagem — compatível com Safari iOS (sem fixed no background-image) */
    body::before {
        content: "";
        position: fixed;
        inset: 0;
        background: url('img/fundo1.jpg') center/cover no-repeat;
        filter: blur(4px);
        z-index: -2;
    }

    /* Overlay escuro por cima da imagem */
    body::after {
        content: "";
        position: fixed;
        inset: 0;
        background: rgba(5, 5, 7, 0.45);
        z-index: -1;
    }

    .container {
        max-width: 1100px;
        margin: 0 auto;
    }

    .topbar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 35px;
        border-bottom: 2px solid var(--accent);
        padding-bottom: 15px;
    }

    .name {
        font-family: 'Space Grotesk', sans-serif;
        font-size: 2.5rem;
        font-weight: 900;
        letter-spacing: -1.5px;
    }

    .back-btn {
        background: transparent;
        color: #fff;
        border: 1px solid rgba(255,255,255,0.2);
        padding: 10px 18px;
        border-radius: 8px;
        font-weight: 700;
        cursor: pointer;
        transition: 0.3s;
    }

    .grid-dashboard {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 28px;
        align-items: start;
    }

    .grid-dashboard > .card:first-child {
        height: fit-content;
        display: block;
    }

    .card {
        background: rgba(255, 255, 255, 0.05) !important;
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.1) !important;
        border-radius: 20px;
        padding: 24px;
    }

    .card h3 {
        font-family: 'Space Grotesk', sans-serif;
        font-weight: 700;
        margin-top: 0;
    }

    .stats {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 15px;
        margin-bottom: 28px;
    }

    .stat {
        background: rgba(255, 255, 255, 0.02);
        padding: 20px;
        border-radius: 15px;
        text-align: center;
        border-bottom: 3px solid rgba(255,255,255,0.1);
    }

    .stat strong { display: block; font-size: 1.8rem; font-family: 'Space Grotesk'; }
    .stat:nth-child(1) strong { color: #fff; }
    .stat:nth-child(2) strong { color: var(--color-proj); }
    .stat:nth-child(3) strong { color: var(--color-mesa); }
    .stat:nth-child(4) strong { color: var(--color-trans); }

    .pie {
        width: 170px;
        height: 170px;
        border-radius: 50%;
        margin: 20px auto;
        background: conic-gradient(
            var(--color-proj) 0% var(--p1),
            var(--color-mesa) var(--p1) var(--p2),
            var(--color-trans) var(--p2) 100%
        );
    }

    .legend-container {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 15px;
        width: 100%;
        margin-top: 15px;
    }

    .legend-item {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 0.9rem;
    }

    .dot { width: 12px; height: 12px; border-radius: 50%; }

    .item {
        padding: 16px;
        border-radius: 14px;
        background: rgba(255, 255, 255, 0.02);
        margin-bottom: 12px;
    }

    .item strong { color: #fff; }

    .muted {
        color: #94a3b8;
        font-size: 0.85rem;
        margin-top: 8px;
        display: flex;
        gap: 5px;
        flex-wrap: wrap;
    }

    .txt-proj { color: var(--color-proj); font-weight: bold; }
    .txt-mesa { color: var(--color-mesa); font-weight: bold; }
    .txt-trans { color: var(--color-trans); font-weight: bold; }

    @media (max-width: 768px) {
        .grid-dashboard { grid-template-columns: 1fr; }
        .stats { grid-template-columns: repeat(2, 1fr); }
        .name { font-size: 1.8rem; }

        .legend-container {
            flex-direction: column;
            align-items: flex-start;
            padding-left: 20px;
        }

        .muted {
            flex-direction: column;
            gap: 2px;
        }

        .muted span.separator { display: none; }
    }
</style>
</head>

<body class="dark-theme">

<div class="container">
    <div class="topbar">
        <div class="name" id="nome"></div>
        <button class="back-btn" onclick="voltarParaEscala()">← Voltar</button>
    </div>

    <div class="stats">
        <div class="stat"><strong id="total"></strong>Total</div>
        <div class="stat"><strong id="proj"></strong>Projeção</div>
        <div class="stat"><strong id="mesa"></strong>Mesa</div>
        <div class="stat"><strong id="trans"></strong>Transmissão</div>
    </div>

    <div class="grid-dashboard">
        <div class="card">
            <h3>Distribuição</h3>
            <div style="display: flex; flex-direction: column; align-items: center;">
                <div class="pie" id="pie"></div>
                
                <div class="legend-container">
                    <div class="legend-item"><span class="dot" style="background: var(--color-proj)"></span> Projeção</div>
                    <div class="legend-item"><span class="dot" style="background: var(--color-mesa)"></span> Mesa de Som</div>
                    <div class="legend-item"><span class="dot" style="background: var(--color-trans)"></span> Transmissão</div>
                </div>
            </div>
        </div>

        <div class="card">
            <h3>Histórico recente</h3>
            <div id="lista"></div>
        </div>
    </div>
</div>

<script>
function formatarData(data) {
    const d = new Date(data + "T00:00:00");
    const dias = ["DOMINGO", "SEGUNDA-FEIRA", "TERÇA-FEIRA", "QUARTA-FEIRA", "QUINTA-FEIRA", "SEXTA-FEIRA", "SÁBADO"];
    return `${d.toLocaleDateString("pt-BR")} • ${dias[d.getDay()]}`;
}

function voltarParaEscala() {
    sessionStorage.setItem("abrirEscala", "true");
    window.location.href = "index.html";
}

const MEMBROS = ["ALAN","BIANCA","JEAN","MEDEIROS","LUCIANA","ANNA BEATRIZ","JOÃO"];

function normalizarTexto(texto) {
    return texto ? texto.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "") : "";
}

async function carregar() {
    try {
        const url = new URLSearchParams(window.location.search);
        const nomeURL = (url.get("nome") || "").toUpperCase();
        const nomeNormalizado = normalizarTexto(nomeURL);
        const nomeOficial = MEMBROS.find(m => normalizarTexto(m) === nomeNormalizado) || nomeURL;
        document.getElementById("nome").innerText = nomeOficial;

        const res = await fetch("dados.json");
        const dados = await res.json();
        const escala = dados.escala;

        const filtrado = escala.filter(item =>
            normalizarTexto(item.projecao) === nomeNormalizado ||
            normalizarTexto(item.mesaSom) === nomeNormalizado ||
            normalizarTexto(item.transmissao) === nomeNormalizado
        );

        const total = filtrado.length;
        const proj = filtrado.filter(i => normalizarTexto(i.projecao) === nomeNormalizado).length;
        const mesa = filtrado.filter(i => normalizarTexto(i.mesaSom) === nomeNormalizado).length;
        const trans = filtrado.filter(i => normalizarTexto(i.transmissao) === nomeNormalizado).length;

        document.getElementById("total").innerText = total;
        document.getElementById("proj").innerText = proj;
        document.getElementById("mesa").innerText = mesa;
        document.getElementById("trans").innerText = trans;

        const p1 = total ? (proj / total) * 100 : 0;
        const p2 = total ? ((proj + mesa) / total) * 100 : 0;
        document.getElementById("pie").style.setProperty("--p1", p1 + "%");
        document.getElementById("pie").style.setProperty("--p2", p2 + "%");

        document.getElementById("lista").innerHTML = filtrado.reverse().map(item => {
            const projClass = normalizarTexto(item.projecao) === nomeNormalizado ? "txt-proj" : "";
            const mesaClass = normalizarTexto(item.mesaSom) === nomeNormalizado ? "txt-mesa" : "";
            const transClass = normalizarTexto(item.transmissao) === nomeNormalizado ? "txt-trans" : "";

            return `
            <div class="item">
                <strong>${formatarData(item.data)}</strong>
                <div class="muted">
                    <div>Projeção: <span class="${projClass}">${item.projecao}</span></div>
                    <span class="separator">|</span>
                    <div>Mesa: <span class="${mesaClass}">${item.mesaSom}</span></div>
                    <span class="separator">|</span>
                    <div>Transmissão: <span class="${transClass}">${item.transmissao}</span></div>
                </div>
            </div>`;
        }).join('');
    } catch (e) { console.error(e); }
}
carregar();
</script>
</body>
</html>
